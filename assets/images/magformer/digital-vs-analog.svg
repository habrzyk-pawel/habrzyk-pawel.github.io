<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
<rect width="900" height="300" fill="#0b0f19"/>
<text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Segoe UI, sans-serif" font-weight="bold">Why Analog Attention?</text>
<rect x="50" y="70" width="350" height="200" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
<text x="225" y="100" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold">Digital Transformer</text>
<text x="225" y="130" text-anchor="middle" fill="#94a3b8" font-size="12">Q, K, V matrices</text>
<text x="225" y="150" text-anchor="middle" fill="#94a3b8" font-size="12">softmax(QK^T/√d)V</text>
<text x="225" y="180" text-anchor="middle" fill="#f87171" font-size="13">~100s µJ / inference</text>
<text x="225" y="210" text-anchor="middle" fill="#f87171" font-size="13">MAC units, memory wall</text>
<defs><marker id="b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker></defs>
<line x1="420" y1="170" x2="480" y2="170" stroke="#38bdf8" stroke-width="3" marker-end="url(#b)"/>
<text x="450" y="160" text-anchor="middle" fill="#38bdf8" font-size="12">compile</text>
<rect x="500" y="70" width="350" height="200" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
<text x="675" y="100" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold">Magformer Oscillator Array</text>
<text x="675" y="130" text-anchor="middle" fill="#94a3b8" font-size="12">LC tanks + coupling resistors</text>
<text x="675" y="150" text-anchor="middle" fill="#94a3b8" font-size="12">Kuramoto sync ≅ attention</text>
<text x="675" y="180" text-anchor="middle" fill="#34d399" font-size="13">&lt;10 µJ / inference</text>
<text x="675" y="210" text-anchor="middle" fill="#34d399" font-size="13">physics does the math</text>
</svg>