<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
<rect width="900" height="240" fill="#0b0f19"/>
<text x="450" y="30" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Segoe UI, sans-serif" font-weight="bold">Magformer Pipeline</text>
<g><rect x="30" y="80" width="150" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
<text x="105" y="110" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">1. Target</text>
<text x="105" y="135" text-anchor="middle" fill="#94a3b8" font-size="11">Tiny Transformer</text>
<text x="105" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">(PyTorch)</text></g>
<g><rect x="230" y="80" width="150" height="80" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
<text x="305" y="110" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">2. Compiler</text>
<text x="305" y="135" text-anchor="middle" fill="#94a3b8" font-size="11">Distill oscillator</text>
<text x="305" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">network (SSA)</text></g>
<g><rect x="430" y="80" width="150" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
<text x="505" y="110" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">3. Validator</text>
<text x="505" y="135" text-anchor="middle" fill="#94a3b8" font-size="11">ODE physics check</text>
<text x="505" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">torchdiffeq</text></g>
<g><rect x="630" y="80" width="230" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
<text x="745" y="110" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">4. Hardware Exporter</text>
<text x="745" y="135" text-anchor="middle" fill="#94a3b8" font-size="11">Map params → L, C, R</text>
<text x="745" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">SPICE netlist .cir</text></g>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs>
<line x1="180" y1="120" x2="220" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<line x1="380" y1="120" x2="420" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<line x1="580" y1="120" x2="620" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<text x="450" y="210" text-anchor="middle" fill="#64748b" font-size="11">Software-to-silicon compiler for oscillator-based Transformer inference</text>
</svg>